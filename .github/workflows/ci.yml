name: CI
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Detect changed content
        id: changes
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACMR ${{ github.event.before }} ${{ github.sha }} -- 'docs/' 'blog/' | head -20)

          if [ -z "$CHANGED" ]; then
            echo "has_content=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_content=true" >> "$GITHUB_OUTPUT"

          MSG=""
          while IFS= read -r file; do
            TITLE=$(grep -m1 -E '^title:|^# ' "$file" 2>/dev/null | sed 's/^title: *//;s/^# *//' | tr -d '"' | head -c 80)
            [ -z "$TITLE" ] && TITLE="$file"

            URL_PATH=$(echo "$file" | sed 's|^docs/|/docs/|;s|^blog/[0-9-]*|/blog/|;s|\.mdx\?$||;s|/index$||')

            if git diff --name-only --diff-filter=A ${{ github.event.before }} ${{ github.sha }} -- "$file" | grep -q .; then
              BADGE="NEW"
            else
              BADGE="UPD"
            fi

            MSG="${MSG}[${BADGE}] ${TITLE}
          https://dead.md${URL_PATH}
          "
          done <<< "$CHANGED"

          {
            echo "content<<CONTENT_EOF"
            echo "$MSG"
            echo "CONTENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          source: "build/"
          target: /home/assada/ut3usw.dead.guru/_deploy_tmp/
          strip_components: 0

      - name: Swap build atomically
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd /home/assada/ut3usw.dead.guru
            rm -rf build_old
            mv build build_old 2>/dev/null || true
            mv _deploy_tmp/build build
            rm -rf _deploy_tmp build_old
            docker compose restart

      - name: IRC notification
        if: success()
        uses: Gottox/irc-message-action@v2
        with:
          channel: '#dead'
          nickname: GitHub
          server: 'irc.dead.guru'
          sasl_password: ${{ secrets.IRC_PASSWORD }}
          notice: false
          message: |-
            ${{ github.actor }} pushed ${{ github.event.ref }} ${{ github.event.compare }}

      - name: Telegram — deploy
        if: success()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *dead.md* deployed

            `${{ github.event.commits[0].message }}`

            [View changes](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

      - name: Telegram — content updates
        if: success() && steps.changes.outputs.has_content == 'true'
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ steps.changes.outputs.content }}
